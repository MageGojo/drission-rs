required-features = ["camoufox"]

[target."cfg(unix)".dependencies]
command-fds = { version = "0.3.3", features = ["tokio"] }

[target."cfg(windows)".dependencies]
windows-sys = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_JobObjects",
    "Win32_System_Registry",
    "Win32_System_Threading",
] }

# 基准:纯函数(编解码 / 定位解析 / 采集导出),不开浏览器,CI 可跑。
[[bench]]
name = "parsing"
harness = false

# 发布产物体积优化(零环境交付的测试二进制要尽量小):
#   opt-level="z" 最小体积、lto 跨 crate 内联去死代码、codegen-units=1 利于 LTO、strip 去符号表。
#   ⚠️ 不设 panic="abort":frb/tokio/mutex 等依赖 unwind,abort 会让一次 panic 直接杀进程。
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "unwind"
