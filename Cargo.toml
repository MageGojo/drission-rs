[package]
name = "drission"
version = "0.3.1"
edition = "2024"
rust-version = "1.85"
# 示例按能力分文件夹(examples/<分类>/),每个 [[example]] 显式声明 path;关掉自动发现(子目录无
# main.rs 本就不会被当示例,这里再加一道保险,杜绝把资源/子目录误判为示例)。
autoexamples = false
authors = ["极数本源 (apizero.cn)"]
description = "Rust 反检测浏览器自动化 + 内置验证码识别:ddddocr 离线 OCR 与图片滑块缺口距离(极验/顶象),默认 Camoufox/Firefox、自动过 Cloudflare 盾、高并发爬虫与 XHR 监听拦截,DrissionPage 风格 API。Anti-detect browser automation in Rust with built-in ddddocr captcha OCR + slider-gap (GeeTest) solving, Camoufox, Cloudflare bypass — a Rust DrissionPage."
documentation = "https://docs.rs/drission"
homepage = "https://apizero.cn"
repository = "https://github.com/MageGojo/drission-rs"
readme = "README.md"
license-file = "LICENSE"
keywords = ["captcha", "ddddocr", "anti-detect", "drissionpage", "browser-automation"]
categories = ["web-programming", "api-bindings", "computer-vision"]
# 发布到 crates.io 时排除:构建产物 / 内部文档 / 各类运行测试产物(样本/吐环境/自训脚手架),
# 这些已在 .gitignore,这里再显式排除(双保险,确保 `cargo publish` 不打包)。
exclude = [
    "/dist",
    "/docs",
    "/target",
    "/yidun_samples",
    "/yidun-train",
    "/dump-env",
    "/dump-env-fp",
    "/douyin-env",
]

# docs.rs:用全部 feature 构建,确保 ocr / slider / cdp 的 API 在文档站可见
# (默认 docs.rs 只用 default features → 这些 feature-gated 类型会被隐藏)。
# 配合 src/lib.rs 顶部的 `#![cfg_attr(docsrs, feature(doc_auto_cfg))]` 显示 feature 徽标。
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
# 后端选择。默认 = 纯 Chromium/CDP(最精简,不含 Camoufox 代码);Camoufox 全 opt-in。
default = ["cdp"]
# Chromium(Chrome / Edge / Brave / Electron,CDP)后端 —— 默认后端。
cdp = []
# Camoufox / Firefox(Juggler)反检测后端 + 全部高层能力(Page/WebPage/Session/Pool/吐环境/过盾…)。
# opt-in,真正 gate:不开 camoufox 则 browser/launcher/page/web_page/session/pool 都不编译。
camoufox = []
# 滑块/图片缺口距离识别(通用滑块 + 极验 + 顶象 ContentNcc)。基于 Camoufox Tab,故自动带入 camoufox。
slider = ["camoufox"]
# 验证码 OCR(ddddocr 预训练模型 + 纯 Rust tract 推理)。Ocr 识别器后端无关;
# tab.ocr_image 便捷方法需 camoufox。可选,避免给不需要的用户引入重依赖。
ocr = ["dep:image", "dep:tract-onnx", "dep:fontdue"]
tract-onnx = ["dep:tract-onnx"]
image = ["dep:image"]
# 纯算签名运行器:内嵌 QuickJS(rquickjs),把吐出的 env.js 编进单个二进制。后端无关,默认关、按需开。
signer = ["dep:rquickjs"]
fontdue = ["dep:fontdue"]
# Session(HTTP)模式的浏览器 TLS/JA3/JA4 + HTTP2 指纹伪装(wreq + BoringSSL)。默认关,按需开;
# 因 SessionPage 当前在 camoufox 门下,故 imply camoufox(同 slider)。需 cmake + C 编译器(编 BoringSSL)。
impersonate = ["camoufox", "dep:wreq", "dep:wreq-util"]

[dependencies]
async-trait = "0.1.89"
bytes = "1.12.0"
dirs = "6.0.0"
ego-tree = "0.11"
fontdue = { version = "0.9.3", optional = true }
futures-util = "0.3.32"
image = { version = "0.25.10", default-features = false, features = ["png", "jpeg"], optional = true }
libc = "0.2.186"
os_pipe = { version = "1.2.3", features = ["io_safety"] }
reqwest = { version = "0.13.4", features = ["json", "stream", "socks"] }
# 内嵌 QuickJS 引擎(纯算签名运行器 `signer` feature 用),编译期把 QuickJS 由 C 源码静态编进二进制。
rquickjs = { version = "0.11", optional = true }
scraper = "0.27.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["full"] }
tokio-tungstenite = "0.29.0"
tracing = "0.1.44"
tract-onnx = { version = "0.23.3", optional = true }
# 浏览器 TLS/JA3/JA4 + HTTP2 指纹 HTTP 客户端(`impersonate` feature 用),reqwest 硬分叉 + BoringSSL。
wreq = { version = "5", optional = true }
# wreq 的浏览器模拟档(Chrome/Firefox/Safari/Edge 各版本的 TLS+HTTP2 指纹配方)。
wreq-util = { version = "2", optional = true }
zip = "8.6.0"

[dev-dependencies]
criterion = "0.7.0"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
# 仅供示例(examples/sites/luffycity_protocol.rs:纯协议无浏览器逆 polyv v11 DRM)的标准 crypto;
# 纯 Rust(RustCrypto),不进发布库(dev-only)。
md-5 = "0.10"
aes = "0.8"
cbc = { version = "0.1", features = ["alloc", "block-padding"] }
base64 = "0.22"
hex = "0.4"

# ── 示例 feature 门控 ──────────────────────────────────────────────────────────
# 默认后端是纯 CDP;用 Camoufox `Browser`/`Page` 的示例必须声明 `required-features=["camoufox"]`,
# 否则默认 `cargo build --examples` 会因 camoufox 模块未编译而失败。
# 运行各示例(头注释里也都写了对应命令,复制即用):
#   cdp 示例:          cargo run --example cdp_demo                                   (默认即含 cdp)
#   Camoufox 系示例:   cargo run --example quickstart --no-default-features --features camoufox
#   滑块(slider):     cargo run --example geetest_slide --no-default-features --features slider
#   Camoufox+OCR:      cargo run --example ocr_captcha --no-default-features --features camoufox,ocr
#   cdp+OCR(点选):    cargo run --example yidun_click --features cdp,ocr
#   cdp+OCR(点选稳定):cargo run --example yidun_click_stable --features cdp,ocr
#   Session TLS 指纹:  cargo run --example session_tls --features impersonate
# ⚠️ Camoufox 系务必带 `--no-default-features`:默认 cdp 与 camoufox 并存时统一接口按「cdp 优先」解析,
#    会与 camoufox 示例的类型冲突(编译失败或跑成 cdp 后端)。cdp 系反之(默认即可)。

# ═════════ CDP 后端核心(examples/cdp/)═════════
[[example]]
name = "cdp_demo"
path = "examples/cdp/cdp_demo.rs"
required-features = ["cdp"]

[[example]]
name = "cdp_advanced"
path = "examples/cdp/cdp_advanced.rs"
required-features = ["cdp"]

